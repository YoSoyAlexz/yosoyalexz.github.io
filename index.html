<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comienzo | AlexzDev</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* Un tono oscuro más moderno */
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        h1 {
            /* El tamaño se ajusta según la pantalla: 
               Mínimo 2rem, máximo 8rem */
            font-size: clamp(2rem, 10vw, 6rem);
            font-weight: 800;
            letter-spacing: -2px;
        }
    </style>
</head>
<body>
    <h1 align="center">Hola 👋, soy Alexz</h1>
    <h3 align="center">Un chico al que le encanta programar.</h3>  
</body>
</html>
