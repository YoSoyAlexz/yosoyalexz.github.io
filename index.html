<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexz | Desarrollador de Software</title>
    <style>
        /* Reset y estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Contenedor principal de la bienvenida */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 100px 24px;
            text-align: center;
        }

        /* Título Principal */
        h1 {
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            color: #000000;
        }

        .name-highlight {
            color: #0071e3; /* Azul profesional */
        }

        .role {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            color: #86868b;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .description {
            font-size: 1.15rem;
            color: #424245;
            max-width: 620px;
            margin: 0 auto 48px;
            line-height: 1.6;
        }

        /* Botón central conectado a sobremi.html */
        .actions {
            display: flex;
            justify-content: center;
            margin-bottom: 120px;
        }

        .btn {
            padding: 16px 48px;
            border-radius: 980px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            background-color: #0071e3;
            color: #ffffff;
            display: inline-block;
        }

        .btn:hover {
            background-color: #0077ed;
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 113, 227, 0.2);
        }

        /* Sección de Proyectos */
        .projects-section {
            width: 100%;
            padding: 80px 24px;
            border-top: 1px solid #d2d2d7;
            text-align: center;
            background-color: #fafafa;
        }

        .projects-section h2 {
            font-size: clamp(2.2rem, 6vw, 3rem);
            font-weight: 700;
            margin-bottom: 16px;
            color: #000;
        }

        .projects-subtitle {
            font-size: 1.25rem;
            color: #86868b;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Ajustes para móviles */
        @media (max-width: 480px) {
            .container {
                padding: 60px 20px;
            }
            .btn {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <section>
            <h1>Hola, soy <span class="name-highlight">Alexz</span></h1>
            <p class="role">Desarrollador de Software</p>
            
            <p class="description">
                Un chico al que le encanta programar.. Recientemente apasionado por el desarrollo web.
            </p>

            <div class="actions">
                <a href="sobremi.html" class="btn">Conóceme más</a>
            </div>
        </section>
    </main>

    <section class="projects-section">
        <h2>Proyectos Destacados</h2>
        <p class="projects-subtitle">Una selección de mis trabajos más recientes</p>
    </section>

</body>
</html>
